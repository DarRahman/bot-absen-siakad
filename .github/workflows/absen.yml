name: Automated Campus Attendance System

on:
  schedule:
    - cron: '0 1 * * 2'   # 08:00 WIB Selasa
    - cron: '30 3 * * 2'  # 10:30 WIB Selasa
    - cron: '0 6 * * 2'   # 13:00 WIB Selasa
    - cron: '0 1 * * 3'   # 08:00 WIB Rabu
    - cron: '0 6 * * 3'   # 13:00 WIB Rabu
    - cron: '30 3 * * 6'  # 10:30 WIB Sabtu
    - cron: '0 6 * * 6'   # 13:00 WIB Sabtu
    - cron: '0 14 * * *'  # 21:00 WIB Sapu Bersih (Harian)

  workflow_dispatch:

jobs:
  attendance-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install selenium requests
      - env:
          NIM_KAMPUS: ${{ secrets.NIM_KAMPUS }}
          PW_KAMPUS: ${{ secrets.PW_KAMPUS }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }} # Pastikan secret ini sudah diisi di Settings
          PYTHONUNBUFFERED: 1
        run: python bot_absen_cloud.py
